<main data-fixture="powerbi-report">
  <section aria-label="Filters" class="filters-pane">
    <article class="filter-card" data-powerbi-filter="list">
      <h3 class="filter-title">Region</h3>
      <button class="clear-filter" type="button">Clear filter</button>
      <input class="filter-search" aria-label="Search Region" />
      <label><input type="checkbox" checked /> EMEA</label>
      <label><input type="checkbox" /> APAC</label>
      <label><input type="checkbox" checked /> Americas</label>
    </article>
    <article class="filter-card" data-powerbi-filter="list">
      <h3 class="filter-title">Product</h3>
      <button class="clear-filter" type="button">Clear filter</button>
      <input class="filter-search" aria-label="Search Product" />
      <label><input type="checkbox" /> BI</label>
      <label><input type="checkbox" checked /> Data Platform</label>
    </article>
    <article class="filter-card" data-powerbi-filter="range">
      <h3 class="filter-title">Revenue</h3>
      <input aria-label="Minimum Revenue" value="1000" />
      <input aria-label="Maximum Revenue" value="5000" />
    </article>
  </section>
</main>
