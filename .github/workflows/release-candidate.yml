name: Release Tag Candidate

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Reject malformed or prerelease release tags early
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
