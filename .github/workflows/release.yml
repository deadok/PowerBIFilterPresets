name: Release Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive release version
        run: |
          set -euo pipefail
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Fetch origin/main for reachability validation
        run: |
          set -euo pipefail
          git fetch --no-tags origin main

      - name: Validate release tag, versions, and ancestry
        run: |
          set -euo pipefail
          npm run release:verify-source -- \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --main-ref origin/main \
            --require-reachability

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Validate built manifest and assets
        run: |
          set -euo pipefail
          npm run release:verify-built -- --tag "$GITHUB_REF_NAME"

      - name: Package extension ZIP
        run: |
          set -euo pipefail
          npm run release:build-zip -- --version "$RELEASE_VERSION" --dist dist --out-dir .release

      - name: Decode CRX signing key
        env:
          CRX_PRIVATE_KEY_BASE64: ${{ secrets.CRX_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          key_dir="$(mktemp -d "${RUNNER_TEMP}/crx-signing.XXXXXX")"
          key_path="${key_dir}/signing-key.pem"
          echo "CRX_KEY_DIR=${key_dir}" >> "$GITHUB_ENV"
          echo "CRX_KEY_PATH=${key_path}" >> "$GITHUB_ENV"
          npm run release:write-key -- --output "$key_path"

      - name: Sign CRX3 artifact
        run: |
          set -euo pipefail
          npm run release:sign-crx -- \
            --version "$RELEASE_VERSION" \
            --zip ".release/power-bi-filter-presets-${RELEASE_VERSION}.zip" \
            --key "$CRX_KEY_PATH" \
            --out-dir .release

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          npm run release:checksums -- \
            --zip ".release/power-bi-filter-presets-${RELEASE_VERSION}.zip" \
            --crx ".release/power-bi-filter-presets-${RELEASE_VERSION}.crx" \
            --output ".release/SHA256SUMS.txt"

      - name: Validate packaged artifacts
        run: |
          set -euo pipefail
          npm run release:inspect -- \
            --zip ".release/power-bi-filter-presets-${RELEASE_VERSION}.zip" \
            --crx ".release/power-bi-filter-presets-${RELEASE_VERSION}.crx" \
            --checksums ".release/SHA256SUMS.txt"
          (
            cd .release
            sha256sum -c SHA256SUMS.txt
          )

      - name: Remove stale draft release on rerun
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if existing_state="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$existing_state" = "true" ]; then
              gh release delete "$GITHUB_REF_NAME" --yes
            else
              echo "Published release already exists for $GITHUB_REF_NAME. Refusing to replace published artifacts." >&2
              exit 1
            fi
          fi

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            --verify-tag \
            --target "$GITHUB_SHA"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            ".release/power-bi-filter-presets-${RELEASE_VERSION}.zip" \
            ".release/power-bi-filter-presets-${RELEASE_VERSION}.crx" \
            ".release/SHA256SUMS.txt"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$GITHUB_REF_NAME" --draft=false

      - name: Clean up private key material
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -n "${CRX_KEY_DIR:-}" ]; then
            rm -rf "$CRX_KEY_DIR"
          fi
