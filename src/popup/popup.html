<section class="popup-shell">
  <header>
    <h1>Power BI Presets</h1>
    <p id="page-status">Loading current page...</p>
  </header>
  <button id="save-current" type="button">Save current filters</button>
  <select id="preset-select" aria-label="Saved presets"></select>
  <div class="actions">
    <button id="apply-preset" type="button">Apply selected preset</button>
    <button id="rename-preset" type="button">Rename</button>
    <button id="delete-preset" type="button">Delete</button>
  </div>
  <output id="result" aria-live="polite"></output>
</section>
