<section class="popup-shell">
  <div class="popup-content">
    <header class="popup-header">
      <img class="popup-logo" src="/assets/brand/logo.png" alt="" aria-hidden="true" />
      <div class="popup-heading">
        <h1>Power BI Presets</h1>
        <p id="page-status">Loading current page...</p>
      </div>
    </header>

    <button id="save-current" class="button-secondary button-with-icon" type="button">
      <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
        <path d="M5 3h12l2 2v16H5z"></path>
        <path d="M8 3v6h8V3M8 21v-8h8v8"></path>
      </svg>
      <span>Save current filters</span>
    </button>

    <hr class="popup-separator" aria-hidden="true" />

    <div class="selected-preset">
      <label for="preset-select">Selected preset</label>
      <select id="preset-select"></select>

      <button id="apply-preset" class="button-primary button-with-icon" type="button">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="m8 12 2.5 2.5L16 9"></path>
        </svg>
        <span>Apply preset</span>
      </button>

      <div class="preset-actions">
        <button
          id="export-preset"
          class="icon-button"
          type="button"
          aria-label="Copy preset JSON"
          title="Copy preset JSON"
          data-tooltip="Copy preset JSON"
        >
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
            <rect x="8" y="8" width="11" height="11" rx="2"></rect>
            <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
          </svg>
        </button>
        <button
          id="rename-preset"
          class="icon-button"
          type="button"
          aria-label="Rename preset"
          title="Rename preset"
          data-tooltip="Rename preset"
        >
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
            <path d="m4 16-.8 4.8L8 20l10.5-10.5-4-4z"></path>
            <path d="m13 7 4 4M12 20h9"></path>
          </svg>
        </button>
        <button
          id="delete-preset"
          class="icon-button icon-button-destructive"
          type="button"
          aria-label="Delete preset"
          title="Delete preset"
          data-tooltip="Delete preset"
        >
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
            <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"></path>
          </svg>
        </button>
      </div>
    </div>

    <output id="result" aria-live="polite"></output>
  </div>

  <div class="modal-backdrop" hidden>
    <section
      id="save-review-dialog"
      class="popup-dialog save-review-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="save-review-title"
      tabindex="-1"
      hidden
    >
      <header class="dialog-header">
        <h2 id="save-review-title">Review filters before saving</h2>
        <p>Choose the active filters to include in this preset.</p>
      </header>

      <div class="dialog-field">
        <label for="save-name">Preset name</label>
        <input id="save-name" type="text" autocomplete="off" aria-describedby="save-name-error save-storage-error" />
        <p id="save-name-error" class="field-error" role="alert" hidden></p>
        <p id="save-storage-error" class="dialog-error" role="alert" hidden></p>
      </div>

      <div class="review-toolbar">
        <div>
          <h3 id="review-filters-title">Filters to save</h3>
          <p id="review-selection-count" role="status" aria-live="polite"></p>
        </div>
        <div class="review-bulk-actions">
          <button
            id="select-all-filters"
            class="icon-button"
            type="button"
            aria-label="Select all filters"
            title="Select all filters"
            data-tooltip="Select all filters"
          >
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
              <rect x="4" y="4" width="16" height="16" rx="2"></rect>
              <path d="m8 12 2.5 2.5L16 9"></path>
            </svg>
          </button>
          <button
            id="clear-all-filters"
            class="icon-button"
            type="button"
            aria-label="Clear all filters"
            title="Clear all filters"
            data-tooltip="Clear all filters"
          >
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
              <rect x="4" y="4" width="16" height="16" rx="2"></rect>
            </svg>
          </button>
        </div>
      </div>

      <div
        id="review-filter-list"
        class="review-filter-list"
        role="group"
        aria-labelledby="review-filters-title"
      ></div>
      <p id="review-empty" class="review-empty" hidden>
        No selected filter values found. Select values in Power BI and try again.
      </p>

      <div class="review-footer">
        <p id="review-selection-guidance" role="status" aria-live="polite"></p>
        <div class="dialog-actions">
          <button id="cancel-save" class="button-secondary" type="button">Cancel</button>
          <button id="confirm-save" class="button-primary" type="button">Save preset</button>
        </div>
      </div>
    </section>

    <section
      id="rename-dialog"
      class="popup-dialog rename-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="rename-dialog-title"
      tabindex="-1"
      hidden
    >
      <h2 id="rename-dialog-title">Rename preset</h2>
      <div class="dialog-field">
        <label for="rename-name">Preset name</label>
        <input
          id="rename-name"
          type="text"
          autocomplete="off"
          aria-describedby="rename-name-error rename-storage-error"
        />
        <p id="rename-name-error" class="field-error" role="alert" hidden></p>
        <p id="rename-storage-error" class="dialog-error" role="alert" hidden></p>
      </div>
      <div class="dialog-actions">
        <button id="cancel-rename" class="button-secondary" type="button">Cancel</button>
        <button id="confirm-rename" class="button-primary" type="button">Rename</button>
      </div>
    </section>

    <section
      class="popup-dialog delete-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-dialog-title"
      aria-describedby="delete-dialog-description"
      tabindex="-1"
      hidden
    >
      <h2 id="delete-dialog-title">Delete preset?</h2>
      <p id="delete-dialog-description">
        Delete <strong id="delete-preset-name"></strong>? This permanently removes the preset.
      </p>
      <p id="delete-error" class="dialog-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button id="cancel-delete" class="button-secondary" type="button">Cancel</button>
        <button id="confirm-delete" class="button-destructive button-with-icon" type="button">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24">
            <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13"></path>
          </svg>
          <span>Delete</span>
        </button>
      </div>
    </section>
  </div>
</section>
